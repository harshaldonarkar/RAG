[project]
enable_telemetry = false
session_timeout = 3600
cache = false

[features]
unsafe_allow_html = false
latex = false
edit_message = true

  [features.audio]
  enabled = false

[UI]
name = "AI Research Assistant"
show_readme_as_default = true
description = "Agentic RAG-powered AI research assistant with multi-agent pipeline and vector search."
default_collapse_content = false
default_expand_messages = true
hide_cot = false

  [UI.theme]
  default = "dark"

  [UI.theme.dark]
  background  = "#0D1117"
  paper       = "#161B22"

    [UI.theme.dark.primary]
    main  = "#7C3AED"
    dark  = "#5B21B6"
    light = "#A78BFA"

  [UI.theme.light]
  background = "#F6F8FA"
  paper      = "#FFFFFF"

    [UI.theme.light.primary]
    main  = "#7C3AED"
    dark  = "#5B21B6"
    light = "#A78BFA"

[meta]
generated_by = "1.3.0"
